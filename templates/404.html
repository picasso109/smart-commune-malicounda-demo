{% extends 'base.html' %}

{% block title %}Page introuvable – Smart Commune{% endblock %}

{% block content %}
<div class="container-fluid py-5">
    <div class="text-center py-5">
        <div class="mb-4">
            <i class="bi bi-search text-primary" style="font-size: 5rem;"></i>
        </div>

        <h1 class="fw-bold text-primary mb-3">404</h1>
        <h3 class="mb-3">Page introuvable</h3>

        <p class="text-muted mx-auto" style="max-width: 650px;">
            La ressource demandée n’existe pas ou a été déplacée
            dans le cockpit Smart Commune de Malicounda.
        </p>

        <div class="d-flex justify-content-center gap-3 mt-4 flex-wrap">
            <a href="{{ url_for('dashboard.dashboard') }}"
               class="btn btn-primary px-4 rounded-pill">
                <i class="bi bi-speedometer2 me-2"></i>
                Retour au cockpit
            </a>

            <a href="{{ url_for('landing.landing') }}"
               class="btn btn-outline-primary px-4 rounded-pill">
                <i class="bi bi-house me-2"></i>
                Accueil
            </a>
        </div>
    </div>
</div>
{% endblock %}
