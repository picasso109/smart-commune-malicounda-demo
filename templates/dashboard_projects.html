{% extends 'base.html' %}
{% block title %}Dashboard Projects{% endblock %}
{% block content %}
<div class="container-fluid">
    <h2 class="fw-bold text-primary mb-4">🏗️ Strategic Project Dashboard</h2>

    {% for project in projects %}
    <a href="{{ url_for('dashboard.project_detail', project_id=project.id) }}"
       class="text-decoration-none text-dark">
        <div class="card p-4 mb-3">
            <h5>{{ project.nom }}</h5>
            <div class="progress">
                <div class="progress-bar" style="width: {{ project.progress }}%"></div>
            </div>
        </div>
    </a>
    {% endfor %}
</div>
{% endblock %}
